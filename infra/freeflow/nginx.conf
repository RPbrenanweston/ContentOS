# @crumb nginx-config
# INF | reverse-proxy | ssl-termination
# why: Nginx configuration terminating SSL/TLS and proxying /stream WebSocket and HTTP API traffic to FreeFlow backend; enforces TLS 1.2+
# in:[incoming HTTPS requests on 443, HTTP on 80] out:[proxied requests to freeflow:8000] err:[SSL cert missing, upstream timeout, large upload rejection]
# hazard: SSL cert path hardcoded to /etc/nginx/ssl/; if certs don't exist or can't be read, Nginx fails to start
# hazard: proxy_read_timeout 3600s for WebSocket could cause resource exhaustion if many idle connections; no cleanup on client disconnect
# edge:./docker-compose.coolify.yml -> RELATES (freeflow service on port 8000 is upstream target)
# edge:../supabase/volumes/api/kong.yml -> RELATES (Kong also uses 443 if both deployed; potential port conflict)
# prompt: Use certbot volume for auto-renewal; add max_connections and keepalive_timeout for WebSocket; add rate limiting on auth endpoints

# ============================================================
# Nginx config for FreeFlow — SSL + WebSocket proxy
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name freeflow.yourdomain.com;

    # Let's Encrypt challenge (uncomment if using certbot)
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name freeflow.yourdomain.com;

    # ── SSL certificates ──
    # Option A: Self-managed (place certs in ./ssl/)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Option B: Let's Encrypt (uncomment and use certbot volume)
    # ssl_certificate     /etc/letsencrypt/live/freeflow.yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/freeflow.yourdomain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # ── WebSocket support (critical for /stream) ──
    location /stream {
        proxy_pass http://freeflow:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout — keep alive for long dictation sessions
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── All other routes (HTTP API + auth) ──
    location / {
        proxy_pass http://freeflow:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large audio uploads for /dictate batch mode
        client_max_body_size 50M;
    }
}
