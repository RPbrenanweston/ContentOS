version: "3.9"

# ============================================================
# FreeFlow Speech-to-Text — Self-Hosted Stack
# Source: https://github.com/RPbrenanweston/freeflowforcontentOS
#
# Deploy:
#   1. cp .env.example .env && edit .env with your values
#   2. docker compose up -d
#   3. Visit https://your-domain/health to verify
#   4. Use bootstrap token to create first admin
# ============================================================

services:
  # ─── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-freeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-freeflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freeflow}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ─── FreeFlow Service ─────────────────────────────────────
  # Builds from the repo's Dockerfile (FastAPI + Node.js auth)
  freeflow:
    build:
      context: ./freeflow-repo/FreeFlowService/images/main
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ── OpenAI ──
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REALTIME_MODEL: ${REALTIME_MODEL:-gpt-4o-realtime-preview}
      POLISH_MODEL: ${POLISH_MODEL:-gpt-4.1-nano}

      # ── Database ──
      DATABASE_URL: postgresql://${POSTGRES_USER:-freeflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-freeflow}
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-freeflow}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-freeflow}

      # ── Auth ──
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${PUBLIC_URL:-https://freeflow.yourdomain.com}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN}

      # ── Server ──
      HOST: "0.0.0.0"
      PORT: "8000"
      AUTH_PORT: "3456"
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - internal

  # ─── Nginx Reverse Proxy (SSL + WebSocket) ────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - freeflow
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      # Uncomment below for Let's Encrypt with certbot
      # - certbot-conf:/etc/letsencrypt:ro
      # - certbot-www:/var/www/certbot:ro
    networks:
      - internal

volumes:
  pgdata:
  # certbot-conf:
  # certbot-www:

networks:
  internal:
    driver: bridge
