# Ruff configuration for Python linting and formatting
# Replaces both flake8/pylint (linting) and black (formatting)

[lint]
# Rules: E=pycodestyle errors, F=pyflakes, I=isort, UP=pyupgrade, B=bugbear
select = ["E", "F", "I", "UP", "B"]
ignore = [
  "E501",  # line length handled by formatter
]

[lint.per-file-ignores]
# Tests can use assertions and broader imports
"**/test_*.py" = ["B011"]
"**/*_test.py" = ["B011"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

# Target Python 3.10+
target-version = "py310"
line-length = 100

# Only lint/format the ai_core package (not legacy files)
include = ["backend/ai_core/**/*.py"]
