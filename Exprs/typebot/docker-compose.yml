services:
  # ---------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------
  typebot-db:
    image: 'postgres:16'
    volumes:
      - 'typebot-db-data:/var/lib/postgresql/data'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER}'
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # Typebot Builder (admin UI — build flows here)
  # Coolify routes FQDN to container port 3000
  # ---------------------------------------------------------
  typebot-builder:
    image: 'baptistearno/typebot-builder:latest'
    depends_on:
      typebot-db:
        condition: service_healthy
    environment:
      - SERVICE_FQDN_TYPEBOTBUILDER_3000
      - 'DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@typebot-db:5432/${POSTGRES_DB}'
      - 'NEXTAUTH_URL=${SERVICE_FQDN_TYPEBOTBUILDER_3000}'
      - 'NEXT_PUBLIC_VIEWER_URL=${SERVICE_FQDN_TYPEBOTVIEWER_3000}'
      - 'ENCRYPTION_SECRET=${ENCRYPTION_SECRET}'
      - 'NEXTAUTH_URL_INTERNAL=http://localhost:3000'
      - 'ADMIN_EMAIL=${ADMIN_EMAIL}'
      - 'SMTP_HOST=${SMTP_HOST}'
      - 'SMTP_PORT=${SMTP_PORT}'
      - 'SMTP_USERNAME=${SMTP_USERNAME}'
      - 'SMTP_PASSWORD=${SMTP_PASSWORD}'
      - 'SMTP_SECURE=${SMTP_SECURE}'
      - 'NEXT_PUBLIC_SMTP_FROM=${NEXT_PUBLIC_SMTP_FROM}'
      - 'S3_ACCESS_KEY=${S3_ACCESS_KEY}'
      - 'S3_SECRET_KEY=${S3_SECRET_KEY}'
      - 'S3_BUCKET=${S3_BUCKET}'
      - 'S3_ENDPOINT=${S3_ENDPOINT}'
      - 'S3_REGION=${S3_REGION}'
      - 'GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}'
      - 'GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}'
      - 'DISABLE_SIGNUP=${DISABLE_SIGNUP}'
      - 'NEXT_TELEMETRY_DISABLED=1'
    healthcheck:
      test:
        - CMD
        - curl
        - '-sf'
        - 'http://localhost:3000/api/health'
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------
  # Typebot Viewer (public-facing — serves published bots)
  # Coolify routes FQDN to container port 3000
  # ---------------------------------------------------------
  typebot-viewer:
    image: 'baptistearno/typebot-viewer:latest'
    depends_on:
      typebot-db:
        condition: service_healthy
    environment:
      - SERVICE_FQDN_TYPEBOTVIEWER_3000
      - 'DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@typebot-db:5432/${POSTGRES_DB}'
      - 'NEXTAUTH_URL=${SERVICE_FQDN_TYPEBOTBUILDER_3000}'
      - 'NEXT_PUBLIC_VIEWER_URL=${SERVICE_FQDN_TYPEBOTVIEWER_3000}'
      - 'ENCRYPTION_SECRET=${ENCRYPTION_SECRET}'
      - 'S3_ACCESS_KEY=${S3_ACCESS_KEY}'
      - 'S3_SECRET_KEY=${S3_SECRET_KEY}'
      - 'S3_BUCKET=${S3_BUCKET}'
      - 'S3_ENDPOINT=${S3_ENDPOINT}'
      - 'S3_REGION=${S3_REGION}'
      - 'NEXT_TELEMETRY_DISABLED=1'
    healthcheck:
      test:
        - CMD
        - curl
        - '-sf'
        - 'http://localhost:3000/api/health'
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  typebot-db-data:
