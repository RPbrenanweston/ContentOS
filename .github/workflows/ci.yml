name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm ci --workspace=packages/ai-core

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test -- --coverage
        working-directory: packages/ai-core

  python:
    name: Python (lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check --config ../ruff.toml ai_core/

      - name: Ruff format check
        run: ruff format --check --config ../ruff.toml ai_core/

      - name: Test
        run: python -m pytest ai_core/ -v --tb=short
